version: 2
updates:
  # GitHub Actions used by the release + docs workflows (pinned to SHAs).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # Dev/docs tooling only (requirements-dev.txt); the runtime is stdlib-only.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
