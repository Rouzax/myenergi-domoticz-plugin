name: Release plugin zip

# Builds a clean, runtime-only zip (all root-level Python modules + README + LICENSE) and
# attaches it to the GitHub Release, plus maintains a lean `dist` branch, so users can install
# without the docs/tests/site cruft.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the release asset only
    steps:
      - name: Checkout tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build runtime-only zip
        env:
          TAG: ${{ github.event.release.tag_name }} # via env, never expanded into the shell script
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9A-Za-z.+-]+$ ]] || { echo "unexpected tag: $TAG" >&2; exit 1; }
          PKG="myenergi"
          mkdir -p "$PKG"
          # Ships every root-level *.py so new runtime modules are picked up
          # automatically. INVARIANT: repo-root *.py must stay runtime-only
          # (dev-only Python lives under tests/ or tools/); otherwise it would
          # leak into the release zip and the dist branch.
          cp *.py README.md LICENSE "$PKG/"
          zip -r "${PKG}-${TAG}.zip" "$PKG"
          unzip -l "${PKG}-${TAG}.zip"

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "myenergi-${TAG}.zip" --clobber

  sync-dist:
    # Maintain a runtime-only `dist` branch (all root-level Python modules + README + LICENSE)
    # with linear history, so git-clone and plugin-manager installs that track `dist` stay clean
    # and updatable.
    runs-on: ubuntu-latest
    permissions:
      contents: write # push to the dist branch
    steps:
      - name: Checkout tag (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Sync runtime files to dist branch
        env:
          TAG: ${{ github.event.release.tag_name }} # via env, never expanded into the shell script
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9A-Za-z.+-]+$ ]] || { echo "unexpected tag: $TAG" >&2; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          snapshot="$(mktemp -d)"
          cp *.py README.md LICENSE "$snapshot/"
          if git ls-remote --exit-code --heads origin dist >/dev/null 2>&1; then
            git fetch origin dist
            git checkout dist
          else
            git checkout --orphan dist
          fi
          git rm -rfq . >/dev/null 2>&1 || true
          cp "$snapshot"/* .
          git add -- *.py README.md LICENSE
          if git diff --cached --quiet; then
            echo "dist already up to date for $TAG"
            exit 0
          fi
          git commit -m "dist: $TAG"
          git push origin dist
