name: Deploy docs

# Builds the mkdocs site and publishes it to the gh-pages branch (GitHub Pages).
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # mkdocs gh-deploy pushes the built site to gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install mkdocs-material
        run: python3 -m pip install --disable-pip-version-check mkdocs-material==9.6.23

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --no-history
