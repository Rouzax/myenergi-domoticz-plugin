site_name: myenergi Monitor for Domoticz
site_description: >-
  A read-only-by-default Domoticz plugin for myenergi (zappi + harvi): true solar generation,
  EV charging, derived home consumption, grid flow, per-inverter power, and opt-in charger control.
site_author: Rouzax
site_url: https://rouzax.github.io/myenergi-domoticz-plugin/
repo_url: https://github.com/Rouzax/myenergi-domoticz-plugin
repo_name: Rouzax/myenergi-domoticz-plugin
copyright: Copyright &copy; 2026 Rouzax - not affiliated with myenergi

theme:
  name: material
  icon:
    logo: material/ev-station
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: install.md
  - Settings: settings.md
  - Monitoring devices: devices.md
  - Charger control: control.md
  - How it works: internals.md
  - Security: security.md
  - Troubleshooting / FAQ: faq.md
  - About: about.md
