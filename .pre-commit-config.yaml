repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff (format check)
        entry: ruff format --check
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
